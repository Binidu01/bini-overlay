name: Release & Publish

on:
  push:
    branches:
      - main
      - alpha
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    name: Tag, Release & Publish
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Determine version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create Git Tag
        run: |
          if [ "${{ github.ref_name }}" = "alpha" ]; then
            TAG="v${{ steps.pkg.outputs.version }}-alpha"
          else
            TAG="v${{ steps.pkg.outputs.version }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "$TAG" --force
          git push origin ${{ github.ref_name }} --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'alpha' && format('v{0}-alpha', steps.pkg.outputs.version) || format('v{0}', steps.pkg.outputs.version) }}
          name: ${{ github.ref_name == 'alpha' && format('v{0}-alpha', steps.pkg.outputs.version) || format('v{0}', steps.pkg.outputs.version) }}
          draft: false
          prerelease: ${{ github.ref_name == 'alpha' }}
          generate_release_notes: true

      - name: Publish to npm via OIDC
        run: |
          if [ "${{ github.ref_name }}" = "alpha" ]; then
            npm publish --access public --tag alpha
          else
            npm publish --access public
          fi
        env:
          NPM_CONFIG_PROVENANCE: true